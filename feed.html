<!DOCTYPE html>
<html>
<head>
    <title>Echora Feed</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <div class="feed-container">

        <h1 class="logo">ECHORA</h1>

        <div class="post-box">
            <textarea placeholder="What's on your mind?"></textarea>
            <button>Post</button>
        </div>

        <div class="divider"></div>

        <div class="post">
            <div class="user">
                <div class="pfp"></div>
                <span>Leo</span>
            </div>

            <p>Hello Echora!</p>
        </div>

        <div class="divider"></div>

        <div class="post">
            <div class="user">
                <div class="pfp"></div>
                <span>Sarah</span>
            </div>

            <p>I drew something cool today.</p>
        </div>

    </div>

</body>
</html>
