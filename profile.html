<!DOCTYPE html>
<html>
<head>
    <title>Profile - Echora</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="profile-container">

    <div class="banner"></div>

    <div class="profile-info">

         <img
id="profilePfp"
class="profile-pfp"
src=""
alt="Profile Picture">

<input
type="file"
id="pfpUpload"
accept="image/*">

<button id="savePfpBtn">
    Upload PFP
</button>

        <h2 id="profileUsername">Loading...</h2>

<p id="profileBio" class="bio">
    Loading...
</p>
<textarea
id="bioInput"
placeholder="Tell people about yourself...">
</textarea>

<button id="saveBioBtn">
    Save Bio
</button>


        <div class="profile-actions">

            <button>Upload PFP</button>
            <button>Draw PFP</button>

            <button>Upload Banner</button>
            <button>Draw Banner</button>

        </div>

        <div class="font-select">

            <label>Font</label>

            <select>
                <option>Arial</option>
                <option>Verdana</option>
                <option>Georgia</option>
                <option>Tahoma</option>
                <option>Trebuchet MS</option>
                <option>Comic Sans MS</option>
            </select>

        </div>

    </div>

    <div class="divider"></div>

    <h3>Posts</h3>

    <div class="post">
        <div class="post-content">
            Hello Echora!
        </div>
    </div>

</div>

<script type="module" src="js/profile.js"></script>

</body>
</html>
